version: 2

models:
  - name: stg_olist__customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: stg_olist__orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_olist__customers')
              field: customer_id

  - name: stg_olist__order_items
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null

  - name: stg_olist__payments
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: payment_value
        data_tests:
          - not_null

  - name: stg_olist__products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique